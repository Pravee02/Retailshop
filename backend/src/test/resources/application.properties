# ============================================================
# Test configuration — isolated in-memory H2
# Runs alongside the production server (no file lock conflict)
# ============================================================

spring.application.name=RetailShopTest

# ---- In-memory H2 (isolated from production file DB) ----
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- JPA ----
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# ---- SQL Init: NEVER run data.sql in tests (DataInitializer handles setup) ----
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# ---- JWT (required for JwtTokenProvider bean) ----
app.jwt.secret=RetailShopTestSecretKeyForJWTTokenGeneration2024VeryLongSecureKeyAtLeast256Bits!!
app.jwt.expiration-ms=86400000

# ---- Disable H2 web console in tests ----
spring.h2.console.enabled=false

# ---- Suppress multipart/upload config warnings ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ---- Logging: keep quiet during tests ----
logging.level.com.retailshop=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

