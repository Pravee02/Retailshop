# ===================================
# Retail Shop - Application Properties
# ===================================

spring.application.name=RetailShop

# ---- Centralized Database Resolution ----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/retailshop;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;AUTO_RECONNECT=TRUE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# HikariCP Pool (Limited for memory stability on Render)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.leak-detection-threshold=2000

# ---- Lazy Initialization ----
spring.main.lazy-initialization=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- MySQL (Production - uncomment to use) ----
# spring.datasource.url=jdbc:mysql://localhost:3306/retailshop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=root

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- SQL Init ----
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ---- Server ----
server.port=8080

# ---- JWT ----
app.jwt.secret=RetailShopSecretKeyForJWTTokenGeneration2024VeryLongSecureKeyAtLeast256Bits!!
app.jwt.expiration-ms=86400000

# ---- File Upload ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ---- Swagger ----
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ---- Logging ----
logging.level.com.retailshop=INFO
logging.level.org.springframework.security=WARN

# ---- Compression (Optimization) ----
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=1024
